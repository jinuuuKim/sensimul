{{define "controller-edit"}}
{{template "header" .}}
<div class="card">
  <h2>Edit Controller: {{.Controller.ID}}</h2>
  <p class="muted">Type is immutable in MVP: {{.Controller.Type}}</p>
  <form method="post" action="/sites/{{.Controller.SiteID}}/controllers/{{.Controller.ID}}/edit" class="row">
    <select name="status">
      <option value="off" {{if eq .Controller.Status "off"}}selected{{end}}>off</option>
      <option value="on" {{if eq .Controller.Status "on"}}selected{{end}}>on</option>
    </select>
    <input name="output_level" value="{{.Controller.OutputLevel}}" />
    <button type="submit">Save</button>
  </form>
  <p><a href="/sites/{{.Controller.SiteID}}/controllers">← back</a></p>
</div>
{{template "footer" .}}
{{end}}
