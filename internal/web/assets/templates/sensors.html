{{define "sensors"}}
{{template "header" .}}
<div class="card">
  <h2>Sensors for {{.Site.ID}}</h2>
  <form method="post" action="/sites/{{.Site.ID}}/sensors" class="row">
    <input name="id" placeholder="sensor id" required />
    <select name="sensor_type">
      <option>temperature</option><option>humidity</option><option>pm25</option><option>pm10</option>
      <option>pressure</option><option>door_open</option><option>presence_detected</option>
    </select>
    <select name="status"><option>normal</option><option>degraded</option><option>offline</option><option>faulted</option></select>
    <button type="submit">Add Sensor</button>
  </form>
</div>
<div class="card">
  <table>
    <thead><tr><th>ID</th><th>Type</th><th>Status</th><th>Calibration</th><th>Action</th></tr></thead>
    <tbody>
    {{range .Sensors}}
      <tr>
        <td>{{.ID}}</td><td>{{.SensorType}}</td><td>{{.Status}}</td><td>{{.Calibration}}</td>
        <td>
          <a href="/sites/{{$.Site.ID}}/sensors/{{.ID}}/edit">edit</a> |
          <a href="/live/sensors/{{.ID}}">live</a>
          <form method="post" action="/sites/{{$.Site.ID}}/sensors/{{.ID}}/delete" style="display:inline">
            <button class="danger" type="submit">delete</button>
          </form>
        </td>
      </tr>
    {{else}}
      <tr><td colspan="5">No sensors configured.</td></tr>
    {{end}}
    </tbody>
  </table>
  <p><a href="/sites">← back</a></p>
</div>
{{template "footer" .}}
{{end}}
