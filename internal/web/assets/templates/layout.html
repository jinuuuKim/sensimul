{{define "header"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.Title}} - SenSimul Web</title>
  <script defer src="/static/app.js"></script>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 0; background:#f5f7fb; color:#1d2433; }
    nav { background:#0f172a; color:#fff; padding:12px 16px; display:flex; gap:16px; }
    nav a { color:#dbeafe; text-decoration:none; font-weight:600; }
    nav a:hover { color:#fff; }
    main { max-width:1100px; margin:20px auto; padding:0 16px 40px; }
    .card { background:#fff; border:1px solid #dbe2ef; border-radius:10px; padding:14px; margin-bottom:12px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .muted { color:#64748b; font-size:14px; }
    .err { color:#b91c1c; font-weight:600; }
    .ok { color:#166534; font-weight:600; }
    table { border-collapse: collapse; width: 100%; background: #fff; }
    th, td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
    th { background: #f8fafc; }
    input, select, button, textarea { padding: 8px; border:1px solid #cbd5e1; border-radius:8px; }
    button { cursor:pointer; background:#0f172a; color:#fff; border:0; }
    .danger { background:#b91c1c; }
    .chart { width:100%; height:220px; border:1px solid #e2e8f0; border-radius:8px; background:#fff; }
    pre { white-space: pre-wrap; line-height:1.5; }
  </style>
</head>
<body>
<nav>
  <a href="/sites">Sites</a>
  <a href="/live">Live</a>
  <a href="/docs/manual">Manual</a>
  <a href="/docs/mqtt">MQTT</a>
</nav>
<main>
  {{if .Error}}<p class="err">{{.Error}}</p>{{end}}
  {{if .Success}}<p class="ok">{{.Success}}</p>{{end}}
  <p class="muted">MQTT Status: {{if .MqttReady}}connected{{else}}disconnected{{end}}</p>
{{end}}

{{define "footer"}}
</main>
</body>
</html>
{{end}}
