mode: dev
seed: 42
tick_interval: 5s
site_id: ""                  # 빈값=모든 현장 동시 실행 / 값 지정=해당 현장만

sqlite:
  path: data/sensimul.db

mqtt:
  broker_url: tcp://mqtt:1883
  client_id: sensimul-local
  qos: 1
  retain: false

weather:
  mode: synthetic                                              # synthetic | kma (기상청 API Hub)
  api_key: ""                                                  # 기상청 API Hub authKey (mode=kma 필수)
  base_url: https://apihub.kma.go.kr/api/typ01/url/kma_sfctm2.php  # 지상관측(ASOS) 시간자료(특정시각)
  station: "108"                                               # ASOS 지점번호 (108=서울)
  ttl: 3600s                                                   # ASOS는 매시간 갱신 → 1시간 주기
  timeout: 10s                                                 # KMA HTTP 요청 타임아웃
  pm_mode: off                                                 # off | kma (황사 PM10 소스, 기본 off)
  pm_base_url: https://apihub.kma.go.kr/api/typ01/url/kma_pm10.php  # 황사 PM10 관측
  pm_column: 2                                                 # PM10 컬럼(0-base). 검증됨: TM STN PM10 FLAG MQC

logging:
  level: info
  format: json

web:
  listen_addr: ":8080"
  stale_after: 10s
  sse_buffer: 256
