mode: dev
seed: 42
tick_interval: 5s
site_id: ""

sqlite:
  path: data/sensimul.db

mqtt:
  broker_url: tcp://mqtt:1883
  client_id: sensimul-local
  qos: 1
  retain: false

weather:
  mode: synthetic
  api_key: ""
  ttl: 300s

logging:
  level: info
  format: json

web:
  listen_addr: ":8080"
  stale_after: 10s
  sse_buffer: 256
