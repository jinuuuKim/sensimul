services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: sensimul-mqtt
    ports:
      - "1883:1883"

  sensimul:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: sensimul
    container_name: sensimul-app
    depends_on:
      - mqtt
    volumes:
      - ./data:/app/data
      - ./config/sensimul.yaml:/app/config/sensimul.yaml:ro
    command: ["run", "--config", "/app/config/sensimul.yaml"]

  web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: web
    container_name: sensimul-web
    depends_on:
      - mqtt
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config/sensimul.yaml:/app/config/sensimul.yaml:ro
    command: ["--config", "/app/config/sensimul.yaml"]
