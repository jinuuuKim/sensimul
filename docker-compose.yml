services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: sensimul-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      MQTT_WS_USERNAME: ${MQTT_WS_USERNAME:?set MQTT_WS_USERNAME in .env}
      MQTT_WS_PASSWORD: ${MQTT_WS_PASSWORD:?set MQTT_WS_PASSWORD in .env}
    volumes:
      - ./config/mosquitto:/mosquitto/config
    command: >
      sh -c "mosquitto_passwd -b -c /mosquitto/config/passwords \"$$MQTT_WS_USERNAME\" \"$$MQTT_WS_PASSWORD\" &&
      chown 1883:1883 /mosquitto/config/passwords &&
      chmod 0640 /mosquitto/config/passwords &&
      exec mosquitto -c /mosquitto/config/mosquitto.conf"

  sensimul:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: sensimul
        TARGETOS: linux
        TARGETARCH: ${TARGETARCH:-arm64}
    container_name: sensimul-app
    depends_on:
      - mqtt
    volumes:
      - ./data:/app/data
      - ./config/sensimul.yaml:/app/config/sensimul.yaml:ro
    command: ["run", "--config", "/app/config/sensimul.yaml"]

  web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: web
        TARGETOS: linux
        TARGETARCH: ${TARGETARCH:-arm64}
    container_name: sensimul-web
    depends_on:
      - mqtt
    ports:
      - "${WEB_PORT:-18080}:8080"
    volumes:
      - ./data:/app/data
      - ./config/sensimul.yaml:/app/config/sensimul.yaml:ro
    command: ["--config", "/app/config/sensimul.yaml"]
